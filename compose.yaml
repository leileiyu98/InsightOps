services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:?DATABASE_NAME must be set}
      MYSQL_USER: ${DATABASE_USER:?DATABASE_USER must be set}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test:
        - CMD-SHELL
        - MYSQL_PWD=$$MYSQL_PASSWORD mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
